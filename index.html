<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Food Liker</title>
    <script src="db.json"></script>
    <script defer src="index.js" type="text/javascript"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h2>Foods Menu</h2>
        <a href="#" clas="logo"><i class="fa-regular fa-plate-utensils"></i>Food</a>
    </header>
    
    <form id="foods-form">
        <label for="food">Food</label>
        <br>
        <input type="text" id="name">
        <br>
        <label for="category">Category</label>
        <br>
        <input type="text" id="name" name="Category">
        <br>
        <label for="food-group">Food Group</label>
        <br>
        <input type="text" id="name" name="Food-group" >
        <br>
        <label for="classification">Classification</label>
        <br>
        <input type="text" id="name" name="Classificatiion">
        <br>
        <br>
        <button type="submit" id="submitBtn">Add Food</button>
    </form>




    <div class="container">
        <div class="liking">
            <button id="likebtn">
                <i class="fa fa-thumbs-up"></i>
            </button>
            <input type="number" id="input1" value="0" name="">
            <!-- <button id="reset-btn">Reset Likes</button> -->

            <button id="dislikebtn">
                <i class="fa fa-thumbs-down"></i>
            </button>
            <input type="number" id="input2" value="0" name="">
            <!-- <button id="reset-btn">Reset Likes</button> -->
        </div>

        <br/>
        
    </div>



    <form class="foodInfo">
            <div id="detailed-info">
                <p class="name">Foods </p>
                    <!-- <img id="image" src="gif/dummy.gif" alt="Food\'s Name"/> -->
                    <!-- display image -->
            </div>
    </form>

    <!-- <div class="bg-container">
            <img src="./images/restaurant.jpeg"/>
    </div> -->

    
  
</body>
</html>
